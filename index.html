<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetIQ - AI Weld Numbering Platform</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#111827;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
color:#38bdf8;
}

.menu{
list-style:none;
}

.menu li{
padding:15px;
margin-bottom:10px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
}

.menu li:hover{
background:#2563eb;
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

.upload{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input[type=file]{
margin-top:15px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#1e293b;
}

th,td{
padding:12px;
border:1px solid #334155;
text-align:center;
}

th{
background:#0f172a;
}
</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
AssetIQ
</div>

<ul class="menu">
<li>Dashboard</li>
<li>Upload Drawing</li>
<li>Weld Register</li>
<li>Reports</li>
<li>Settings</li>
</ul>

</div>

<div class="main">

<div class="header">
<h1>AI Weld Numbering Platform</h1>
</div>

<div class="cards">

<div class="card">
<h3>Total Drawings</h3>
<p id="drawings">0</p>
</div>

<div class="card">
<h3>Total Welds</h3>
<p id="welds">0</p>
</div>

<div class="card">
<h3>Pending Review</h3>
<p id="review">0</p>
</div>

</div>

<div class="upload">

<h2>Upload Isometric Drawing</h2>

<input type="file" id="drawingFile">

<br>

<button onclick="generateWelds()">
Generate Weld Numbers
</button>

</div>

<h2>Weld Register</h2>

<table>

<thead>
<tr>
<th>Weld No.</th>
<th>Line No.</th>
<th>Drawing No.</th>
<th>Status</th>
</tr>
</thead>

<tbody id="weldTable">

</tbody>

</table>

</div>

<script>

function generateWelds(){

const table=document.getElementById("weldTable");

table.innerHTML="";

for(let i=1;i<=20;i++){

let row=`
<tr>
<td>W-${String(i).padStart(3,'0')}</td>
<td>LINE-100</td>
<td>ISO-001</td>
<td>Pending</td>
</tr>
`;

table.innerHTML+=row;

}

document.getElementById("drawings").innerText="1";
document.getElementById("welds").innerText="20";
document.getElementById("review").innerText="20";

alert("Weld numbering completed successfully");

}

</script>

<!-- AssetIQ Test -->
<h1>AssetIQ Test X 2026</h1>
 </body>
</html>
