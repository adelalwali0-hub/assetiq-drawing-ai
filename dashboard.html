<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AssetIQ Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1220;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:240px;
background:#111827;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
margin-bottom:30px;
}

.menu div{
background:#1e293b;
padding:15px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.main{
flex:1;
padding:25px;
}

.header{
margin-bottom:25px;
}

.header h1{
font-size:36px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.card h3{
margin-bottom:10px;
}

.number{
font-size:32px;
color:#38bdf8;
font-weight:bold;
}

.section{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
background:#2563eb;
border:none;
padding:12px 20px;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border:1px solid #334155;
text-align:center;
}

th{
background:#0f172a;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
AssetIQ
</div>

<div class="menu">
<div>Dashboard</div>
<div>Drawings</div>
<div>Weld Register</div>
<div>Inspection</div>
<div>Reports</div>
<div>Settings</div>
</div>

</div>

<div class="main">

<div class="header">
<h1>AssetIQ Dashboard</h1>
<p>AI-Powered Asset Integrity Management Platform</p>
</div>

<div class="cards">

<div class="card">
<h3>Total Drawings</h3>
<div class="number" id="drawings">0</div>
</div>

<div class="card">
<h3>Total Welds</h3>
<div class="number" id="welds">0</div>
</div>

<div class="card">
<h3>Pending Review</h3>
<div class="number" id="review">0</div>
</div>

</div>

<div class="section">

<h2>Upload Isometric Drawing</h2>

<input type="file" id="pdfFile" accept=".pdf">

<br><br>

<iframe
id="pdfViewer"
width="100%"
height="600"
style="background:white;border-radius:10px;">
</iframe>

<br>

<button onclick="generateWelds()">
Generate Weld Numbers
</button>

</div>

<div class="section">

<h2>Weld Register</h2>

<table>

<thead>
<tr>
<th>Weld No.</th>
<th>Line No.</th>
<th>Drawing</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableData">

</tbody>

</table>

</div>

</div>

<script>

function generateWelds(){

document.getElementById("drawings").innerText="1";
document.getElementById("welds").innerText="20";
document.getElementById("review").innerText="20";

let table="";

for(let i=1;i<=20;i++){

table += `
<tr>
<td>W-${String(i).padStart(3,'0')}</td>
<td>LINE-${i}</td>
<td>ISO-001</td>
<td>Pending</td>
</tr>
`;

}

document.getElementById("tableData").innerHTML=table;

alert("20 Weld Numbers Generated");

}

document.getElementById("pdfFile").addEventListener("change", function(e){

const file = e.target.files[0];

if(file){

const url = URL.createObjectURL(file);

document.getElementById("pdfViewer").src = url;

}

});
</script>

</body>
</html>
